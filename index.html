<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Frontend Page</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: white;
        }

        header {
            background: #1e293b;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            margin: 0;
            color: #38bdf8;
        }

        nav a {
            color: white;
            margin: 0 10px;
            text-decoration: none;
        }

        nav a:hover {
            color: #38bdf8;
        }

        .hero {
            height: 80vh;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            text-align: center;
        }

        .hero h2 {
            font-size: 40px;
        }

        .hero span {
            color: #38bdf8;
        }

        .btn {
            margin-top: 20px;
            padding: 10px 20px;
            border: none;
            background: #38bdf8;
            color: black;
            cursor: pointer;
            border-radius: 5px;
        }

        .btn:hover {
            background: #0ea5e9;
        }

        .section {
            padding: 50px;
            text-align: center;
        }

        .card {
            background: #1e293b;
            margin: 15px;
            padding: 20px;
            border-radius: 10px;
            display: inline-block;
            width: 250px;
        }

        footer {
            background: #1e293b;
            text-align: center;
            padding: 15px;
        }
    </style>
</head>
<body>

<header>
    <h1>MySite</h1>
    <nav>
        <a href="#">Home</a>
        <a href="#">Projects</a>
        <a href="#">Contact</a>
    </nav>
</header>

<section class="hero">
    <h2>Hello, I'm <span>Developer</span></h2>
    <p>Frontend Developer | HTML | CSS | JavaScript</p>
    <button class="btn">Hire Me</button>
</section>

<section class="section">
    <h2>Projects</h2>
    <div class="card">Project 1</div>
    <div class="card">Project 2</div>
    <div class="card">Project 3</div>
</section>

<section class="section">
    <h2>Contact</h2>
    <p>Email: example@gmail.com</p>
</section>

<footer>
    <p>© 2026 My Website</p>
</footer>

</body>
</html>
